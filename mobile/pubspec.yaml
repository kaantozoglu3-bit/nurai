name: painrelief_ai
description: AI-powered physiotherapy assistant — PainRelief AI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  google_sign_in: ^6.2.1
  firebase_app_check: ^0.3.2

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # HTTP
  dio: ^5.4.3

  # Local Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0

  # Video
  youtube_player_flutter: ^9.1.1

  # SSL Pinning — pending native setup
  # ssl_pinning_plugin: ^2.0.2 is incompatible with AGP 8+ (missing namespace
  # in android/build.gradle). The dart:io SPKI pinning in api_service.dart
  # is the active mechanism. Re-enable once upstream support is available or
  # switch to http_certificate_pinning.
  # ssl_pinning_plugin: (pending — requires iOS/Android native setup)

  # App Info
  package_info_plus: ^8.1.2

  # Utils
  intl: ^0.20.2
  equatable: ^2.0.5
  crypto: ^3.0.3

  # Share & Links
  share_plus: ^10.1.4
  url_launcher: ^6.3.1

  # Notifications
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4

  # Charts
  fl_chart: ^0.68.0

  # Analytics
  firebase_analytics: ^11.4.6

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/svg/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: 'assets/images/app_icon.png'
  adaptive_icon_background: '#2563EB'
  adaptive_icon_foreground: 'assets/images/app_icon.png'
  web:
    generate: true
    image_path: 'assets/images/app_icon.png'
    background_color: '#2563EB'
    theme_color: '#2563EB'
  windows:
    generate: true
    image_path: 'assets/images/app_icon.png'
    icon_size: 48
  macos:
    generate: true
    image_path: 'assets/images/app_icon.png'

flutter_native_splash:
  color: '#2563EB'
  color_dark: '#1D4ED8'
  image: assets/images/app_icon.png
  android: true
  ios: true
  web: false
  android_12:
    color: '#2563EB'
    image: assets/images/app_icon.png
